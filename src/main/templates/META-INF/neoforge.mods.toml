modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId = "treeliable"
type="required"
versionRange = "[${treeliable_version},)"
ordering = "NONE"
side = "BOTH"


[[dependencies.${mod_id}]]
modId = "cloth_config"
type="required"
versionRange = "[${cloth_config_version},)"
ordering = "NONE"
side = "BOTH"
